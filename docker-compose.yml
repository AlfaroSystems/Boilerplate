services:

  # PHP Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: alfar
        uid: 1000
    image: boilerplate-app
    container_name: boilerplate-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - boilerplate-network

  # Nginx Service
  web:
    image: nginx:alpine
    container_name: boilerplate-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker-compose/nginx:/etc/nginx/conf.d/
    networks:
      - boilerplate-network

  # Database Service
  db:
    image: postgres:15-alpine
    container_name: boilerplate-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - boilerplate-network

  # Redis Service
  redis:
    image: redis:alpine
    container_name: boilerplate-redis
    restart: unless-stopped
    networks:
      - boilerplate-network

networks:
  boilerplate-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
